<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — MAXIBAZARD</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">

  <!-- Navbar minimaliste -->
  <nav class="navbar">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__logo">MAXI<span>BAZARD</span></a>
      <div class="navbar__links" id="nav-links">
        <a href="index.html" class="navbar__link">🛍️ Catalogue</a>
        <a href="cart.html" class="navbar__link">
          🛒 Panier <span class="navbar__badge" id="cart-count">0</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Formulaire -->
  <main class="auth-main">
    <div class="auth-card">

      <a href="index.html" class="auth-logo">MAXI<span>BAZARD</span></a>

      <div>
        <h1 class="auth-title">Bon retour ! 👋</h1>
        <p class="auth-subtitle">Connectez-vous pour accéder à vos favoris et commandes</p>
      </div>

      <div id="auth-error"  class="auth-error"></div>
      <div id="auth-success" class="auth-success"></div>

      <form id="login-form" class="auth-form" novalidate>

        <div class="auth-field">
          <label class="auth-label" for="login-nom">Nom d'utilisateur</label>
          <input class="auth-input" type="text" id="login-nom"
                 placeholder="Votre pseudo" autocomplete="username" required>
        </div>

        <div class="auth-field">
          <label class="auth-label" for="login-code">Mot de passe</label>
          <input class="auth-input" type="password" id="login-code"
                 placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <button type="submit" class="auth-submit" id="login-btn">
          <span class="auth-submit-text">Se connecter</span>
          <span class="auth-submit-loader"></span>
        </button>

      </form>

      <div class="auth-divider">ou</div>

      <div class="auth-switch">
        Pas encore de compte ?
        <a href="signup.html">Créer un compte</a>
      </div>

      <a href="index.html" class="auth-guest">Continuer sans compte →</a>

    </div>
  </main>

  <footer class="footer">
    <p>© 2025 <strong>MAXIBAZARD</strong> — L'insolite, c'est notre métier.</p>
  </footer>

  <script type="module" src="js/auth.js"></script>
  <script type="module">
    import { updateCartBadge } from './js/utils/cart.js';
    updateCartBadge();
  </script>
</body>
</html>
