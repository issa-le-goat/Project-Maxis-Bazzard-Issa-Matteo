<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogue — MAXIBAZARD</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/catalog.css">
</head>
<body>

  <!-- ── NAVBAR ──────────────────────────────────────────── -->
  <nav class="navbar" role="navigation" aria-label="Navigation principale">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__logo">MAXI<span>BAZARD</span></a>

      <button class="navbar__burger" id="burger-btn" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

      <div class="navbar__links" id="nav-links">
        <a href="index.html" class="navbar__link navbar__link--active">🛍️ Catalogue</a>
        <a href="favorites.html" class="navbar__link">
          ♥ Favoris
          <span class="navbar__badge navbar__fav-badge" id="fav-count">0</span>
        </a>
        <a href="cart.html" class="navbar__link">
          🛒 Panier
          <span class="navbar__badge" id="cart-count">0</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- ── HERO ────────────────────────────────────────────── -->
  <section class="catalog-hero" aria-label="Bienvenue">
    <div class="catalog-hero__inner container">
      <h1 class="catalog-hero__title">Les objets <span>vraiment</span> insolites</h1>
      <p class="catalog-hero__sub">Mini aspirateurs, parapluie-chaussures, surligneurs charcuterie… Bienvenue dans le bizarre.</p>
    </div>
  </section>

  <!-- ── FILTRES & TRI ────────────────────────────────────── -->
  <div class="catalog-controls" role="search" aria-label="Filtres et tri">
    <div class="controls-inner">

      <div class="filter-group">
        <label class="filter-label" for="filter-gender">Genre</label>
        <select class="select-control" id="filter-gender">
          <option value="all">Tous</option>
          <option value="Homme">Homme</option>
          <option value="Femme">Femme</option>
          <option value="Unisexe">Unisexe</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label" for="filter-type">Type</label>
        <select class="select-control" id="filter-type">
          <option value="all">Tous les types</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-label" for="filter-color">Couleur</label>
        <select class="select-control" id="filter-color">
          <option value="all">Toutes</option>
        </select>
      </div>

      <label class="promo-filter" for="filter-promo">
        <input type="checkbox" id="filter-promo">
        <span>🏷️ Promos</span>
      </label>

      <div class="controls-spacer"></div>

      <div class="controls-meta">
        <span class="results-count" id="results-count">22 produits</span>
        <button id="reset-filters">Réinitialiser</button>

        <div class="filter-group">
          <label class="filter-label" for="sort-select">Trier</label>
          <select class="select-control" id="sort-select">
            <option value="default">Pertinence</option>
            <option value="asc">Prix ↑</option>
            <option value="desc">Prix ↓</option>
            <option value="promo">Meilleures promos</option>
          </select>
        </div>
      </div>

    </div>
  </div>

  <!-- ── CATALOGUE ────────────────────────────────────────── -->
  <main>
    <div class="catalog-section container">
      <div class="product-grid" id="catalog-grid" aria-label="Liste des produits"></div>
    </div>
  </main>

  <!-- ── FOOTER ───────────────────────────────────────────── -->
  <footer class="footer">
    <p>© 2026 <strong>MAXIBAZARD</strong> — L'insolite, c'est notre métier.</p>
  </footer>

  <script type="module" src="js/catalog.js"></script>
  <script>
    // Burger menu mobile
    document.getElementById('burger-btn').addEventListener('click', function () {
      const links = document.getElementById('nav-links');
      const open  = links.classList.toggle('is-open');
      this.setAttribute('aria-expanded', open);
    });
  </script>
</body>
</html>
