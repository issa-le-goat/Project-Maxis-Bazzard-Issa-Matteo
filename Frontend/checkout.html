<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commander — MAXIBAZARD</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/checkout.css">
</head>
<body>

  <!-- ── NAVBAR ──────────────────────────────────────────── -->
  <nav class="navbar" role="navigation">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__logo">MAXI<span>BAZARD</span></a>

      <button class="navbar__burger" id="burger-btn" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

      <div class="navbar__links" id="nav-links">
        <a href="index.html" class="navbar__link">🛍️ Catalogue</a>
        <a href="favorites.html" class="navbar__link">
          ♥ Favoris
          <span class="navbar__badge navbar__fav-badge" id="fav-count">0</span>
        </a>
        <a href="cart.html" class="navbar__link">
          🛒 Panier
          <span class="navbar__badge" id="cart-count">0</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- ── CONTENU ──────────────────────────────────────────── -->
  <main class="checkout-page">
    <div class="container">
      <h1 class="checkout-title">Finaliser ma <span>Commande</span></h1>

      <div id="checkout-container">

        <!-- COLONNE GAUCHE : Formulaire adresse -->
        <div>
          <div id="saved-addr-banner"></div>

          <div class="delivery-card">
            <h3>📍 Adresse de livraison</h3>

            <form id="delivery-form" novalidate>
              <div class="form-grid">

                <div class="form-group form-group--full">
                  <label class="form-label" for="addr-name">
                    Nom complet <span class="required">*</span>
                  </label>
                  <input class="form-input" type="text" id="addr-name"
                         placeholder="Jean Dupont" autocomplete="name" required>
                </div>

                <div class="form-group form-group--full">
                  <label class="form-label" for="addr-street">
                    Adresse <span class="required">*</span>
                  </label>
                  <input class="form-input" type="text" id="addr-street"
                         placeholder="12 rue de la République" autocomplete="street-address" required>
                </div>

                <div class="form-group form-group--full">
                  <label class="form-label" for="addr-complement">
                    Complément d'adresse
                  </label>
                  <input class="form-input" type="text" id="addr-complement"
                         placeholder="Appartement, bâtiment…" autocomplete="address-line2">
                </div>

                <div class="form-group">
                  <label class="form-label" for="addr-postal">
                    Code postal <span class="required">*</span>
                  </label>
                  <input class="form-input" type="text" id="addr-postal"
                         placeholder="75001" autocomplete="postal-code"
                         maxlength="10" required>
                </div>

                <div class="form-group">
                  <label class="form-label" for="addr-city">
                    Ville <span class="required">*</span>
                  </label>
                  <input class="form-input" type="text" id="addr-city"
                         placeholder="Paris" autocomplete="address-level2" required>
                </div>

                <div class="form-group form-group--full">
                  <label class="form-label" for="addr-country">Pays</label>
                  <select class="form-select" id="addr-country" autocomplete="country-name">
                    <option value="France">France</option>
                    <option value="Belgique">Belgique</option>
                    <option value="Suisse">Suisse</option>
                    <option value="Luxembourg">Luxembourg</option>
                    <option value="Canada">Canada</option>
                    <option value="Maroc">Maroc</option>
                    <option value="Tunisie">Tunisie</option>
                    <option value="Algérie">Algérie</option>
                  </select>
                </div>

              </div>

              <div class="form-actions">
                <button type="submit" class="btn btn--primary btn--lg">
                  ✅ Confirmer la commande
                </button>
              </div>
            </form>
          </div>
        </div>

        <!-- COLONNE DROITE : Récapitulatif -->
        <div id="order-summary"></div>

      </div>
    </div>
  </main>

  <!-- ── FOOTER ───────────────────────────────────────────── -->
  <footer class="footer">
    <p>© 2025 <strong>MAXIBAZARD</strong> — L'insolite, c'est notre métier.</p>
  </footer>

  <script type="module" src="js/checkoutPage.js"></script>
  <script>
    document.getElementById('burger-btn').addEventListener('click', function () {
      const links = document.getElementById('nav-links');
      const open  = links.classList.toggle('is-open');
      this.setAttribute('aria-expanded', open);
    });
  </script>
</body>
</html>
